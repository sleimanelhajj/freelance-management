<section class="clients-page">
  <div class="clients-toolbar">
    <app-action-button
      [buttonLabel]="'+ Add Client'"
      (action)="openAddModal()"
      [addButton]="true"
    ></app-action-button>
  </div>

  <div class="clients-table-card">
    <div class="table-header">
      <span>NAME</span>
      <span>EMAIL</span>
      <span>COMPANY</span>
      <span>PHONE</span>
      <span>STATUS</span>
      <span>ACTIONS</span>
    </div>

    <div class="skeleton-list" *ngIf="loading()" aria-label="Loading clients">
      <div class="skeleton-row" *ngFor="let row of [1, 2, 3]">
        <span class="skeleton-line w-60"></span>
        <span class="skeleton-line w-80"></span>
        <span class="skeleton-line w-50"></span>
        <span class="skeleton-line w-40"></span>
      </div>
    </div>
    <p class="state error" *ngIf="!loading() && errorMessage">{{ errorMessage }}</p>
    <p class="state" *ngIf="!loading() && !errorMessage && clients.length === 0">
      No clients found.
    </p>

    <div class="table-row" *ngFor="let client of clients">
      <span class="cell-name">{{ client.name }}</span>
      <span>{{ client.email }}</span>
      <span>{{ client.company || '-' }}</span>
      <span>{{ client.phone || '-' }}</span>
      <span>
        <span class="status-pill" [ngClass]="statusClass(client.status)">{{ client.status }}</span>
      </span>
      <span class="actions-cell">
        <app-action-button [buttonLabel]="'View'" (action)="onView(client)"></app-action-button>
        <app-action-button
          [buttonLabel]="'Edit'"
          (action)="openEditModal(client)"
        ></app-action-button>
        <app-action-button
          [buttonLabel]="'Delete'"
          [deleteButton]="true"
          (action)="requestDelete(client)"
        ></app-action-button>
      </span>
    </div>
  </div>
</section>

<app-modal-shell
  [open]="formModalOpen()"
  [title]="formMode === 'create' ? 'Add Client' : 'Edit Client'"
  (closed)="closeFormModal()"
>
    <div class="modal-blocker" *ngIf="formMode === 'edit' && editDetailsLoading()">
      <span class="skeleton-line w-45 h-lg"></span>
      <span class="skeleton-line w-70"></span>
    </div>

    <form [formGroup]="clientForm" (ngSubmit)="submitClientForm()">
      <div class="form-grid">
        <div class="field">
          <label>Name *</label>
          <app-input-field
            [control]="clientForm.controls.name"
            type="text"
            name="name"
            placeholder="ACME Corp"
          ></app-input-field>
        </div>

        <div class="field">
          <label>Email *</label>
          <app-input-field
            [control]="clientForm.controls.email"
            type="email"
            name="email"
            placeholder="client@acme.com"
          ></app-input-field>
        </div>

        <div class="field">
          <label>Phone</label>
          <app-input-field
            [control]="clientForm.controls.phone"
            type="text"
            name="phone"
            placeholder="+961 71 000 000"
          ></app-input-field>
        </div>

        <div class="field">
          <label>Company</label>
          <app-input-field
            [control]="clientForm.controls.company"
            type="text"
            name="company"
            placeholder="Company name"
          ></app-input-field>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea formControlName="notes" rows="4" placeholder="VIP client..."></textarea>
        </div>

        <div class="field field-full">
          <label>Status</label>
          <mat-form-field class="select-field" appearance="outline" subscriptSizing="dynamic">
            <mat-select formControlName="status">
              <mat-option value="ACTIVE">ACTIVE</mat-option>
              <mat-option value="INACTIVE">INACTIVE</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>

      <div class="form-actions">
        <app-action-button
          [buttonLabel]="'Cancel'"
          (action)="closeFormModal()"
          [modalButton]="true"
        ></app-action-button>
        <app-action-button
          [buttonLabel]="
            submitting()
              ? formMode === 'create'
                ? 'Creating...'
                : 'Saving...'
              : formMode === 'create'
                ? 'Create Client'
                : 'Save Changes'
          "
          (action)="submitClientForm()"
          [modalButton]="true"
          [addButton]="true"
          [disabled]="submitting() || editDetailsLoading()"
          [submitting]="submitting()"
          [submitButton]="true"
        ></app-action-button>
      </div>
    </form>
</app-modal-shell>

<app-modal-shell
  [open]="deleteConfirmOpen()"
  title="Delete Client"
  size="confirm"
  (closed)="cancelDelete()"
>
    <p class="modal-copy">
      Are you sure you want to delete
      <strong>{{ deleteCandidate?.name }}</strong
      >?
    </p>
    <div class="confirm-actions">
      <app-action-button
        [buttonLabel]="'Cancel'"
        (action)="cancelDelete()"
        [modalButton]="true"
      ></app-action-button>
      <app-action-button
        [buttonLabel]="deleteSubmitting() ? 'Deleting...' : 'Delete'"
        [deleteButton]="true"
        (action)="confirmDelete()"
        [modalButton]="true"
        [disabled]="deleteSubmitting()"
      ></app-action-button>
    </div>
</app-modal-shell>
