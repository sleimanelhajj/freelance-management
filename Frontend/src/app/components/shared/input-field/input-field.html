<div class="input-shell">
  <input
    class="input-field"
    [class.is-date-placeholder]="type === 'date' && inputType === 'text'"
    [class.is-invalid]="control.invalid && control.touched"
    [type]="inputType"
    [attr.name]="name || null"
    [formControl]="control"
    [placeholder]="placeholder"
    (focus)="activateDateInput()"
    (blur)="deactivateDateInput()"
  />
</div>
