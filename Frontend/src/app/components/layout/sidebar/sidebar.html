<aside class="sidebar">
  <div class="brand-block">
    <h1 class="logo"><span class="first-half">Free</span><span class="second-half">lance</span></h1>
    <p class="subtitle">Management Dashboard</p>
  </div>

  <nav class="nav-list">
    <div class="nav-section" *ngFor="let section of navSections">
      <p class="section-title">{{ section.label }}</p>
      <a
        *ngFor="let link of section.links"
        [routerLink]="link.route"
        class="nav-link"
        routerLinkActive="active"
      >
        <img [src]="link.icon" [alt]="link.label + ' icon'" />
        <span>{{ link.label }}</span>
      </a>
    </div>
  </nav>

  <div class="user-block">
    <div class="avatar">SL</div>
    <div class="user-details">
      <p class="name">{{ userName }}</p>
      <p class="email">{{ userEmail }}</p>
    </div>
  </div>
</aside>
