<div class="toast" *ngIf="visible" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="toast-content">
    <strong class="toast-title">{{ title }}</strong>
    <p class="toast-message">{{ message }}</p>
  </div>
  <button type="button" class="toast-close" (click)="close()" aria-label="Close notification">
    &times;
  </button>
</div>
